<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>আমার OT ডায়েরি</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --card2: #1a2236;
    --accent: #00d4aa;
    --accent2: #ff6b35;
    --accent3: #ffd700;
    --text: #e8eaf0;
    --muted: #6b7a99;
    --border: #1e2d47;
    --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hind Siliguri', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,212,170,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== PAGES ===== */
  .page { display: none; position: relative; z-index: 1; }
  .page.active { display: block; }

  /* ===== AUTH PAGE ===== */
  .auth-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }
  .auth-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), #0097a7);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(0,212,170,0.3);
    animation: pulse 3s infinite;
  }
  @keyframes pulse {
    0%,100%{box-shadow:0 8px 32px rgba(0,212,170,0.3);}
    50%{box-shadow:0 8px 48px rgba(0,212,170,0.5);}
  }
  .auth-title {
    font-family: 'Teko', sans-serif;
    font-size: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px; text-align: center;
  }
  .auth-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; text-align: center; }

  .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 24px;
    width: 100%;
    max-width: 400px;
    animation: slideUp 0.4s ease;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }

  .tab-row {
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--card2);
    border-radius: 12px; padding: 4px;
    margin-bottom: 24px;
  }
  .tab-btn {
    padding: 10px;
    border: none; border-radius: 10px;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    background: transparent; color: var(--muted);
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--accent); color: #000; }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 6px; }
  .form-group input {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 15px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,0.1); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #0097a7);
    border: none; border-radius: 14px;
    padding: 14px;
    color: #000; font-family: 'Hind Siliguri', sans-serif;
    font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .err-msg { color: var(--red); font-size: 13px; margin-top: 10px; text-align: center; min-height: 20px; }

  /* ===== MAIN APP ===== */
  .app-wrap { max-width: 480px; margin: 0 auto; padding: 0 16px 100px; }

  .header { text-align: center; padding: 28px 0 20px; }
  .header h1 {
    font-family: 'Teko', sans-serif; font-size: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-user { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .header-user span { color: var(--accent); font-weight: 600; }

  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .btn-logout {
    background: transparent;
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: 10px;
    color: var(--accent2);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 12px; padding: 6px 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-logout:hover { background: rgba(255,107,53,0.1); }

  .profile-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .avatar {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), #0097a7);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: #000;
    flex-shrink: 0;
  }
  .profile-info { flex: 1; }
  .profile-name { font-size: 16px; font-weight: 600; }
  .profile-id { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .month-selector {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .month-nav {
    width: 38px; height: 38px;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; outline: none;
  }
  .month-nav:hover { background: var(--accent); border-color: var(--accent); color: #000; }
  .month-name-display { font-family: 'Teko', sans-serif; font-size: 22px; text-align: center; }
  .year-display { font-size: 12px; color: var(--muted); text-align: center; }

  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .sum-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px;
  }
  .sum-card.full { grid-column: 1/-1; background: linear-gradient(135deg,#0d2137,#0a1a2e); border-color: rgba(0,212,170,0.25); }
  .s-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .s-val { font-family: 'Teko', sans-serif; font-size: 26px; color: var(--accent); }
  .s-val.orange { color: var(--accent2); }
  .s-val.gold { font-size: 32px; color: var(--accent3); }
  .breakdown {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    background: var(--card2); border-radius: 10px;
    padding: 10px; margin-top: 10px; gap: 6px;
  }
  .b-item { text-align: center; }
  .b-lbl { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .b-val { font-size: 13px; font-weight: 600; }

  .progress-sec {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 16px;
  }
  .prog-lbl { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
  .prog-lbl span:last-child { color: var(--accent); font-weight: 600; }
  .prog-bg { background: var(--card2); border-radius: 8px; height: 8px; overflow: hidden; }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 8px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .table-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden; margin-bottom: 16px;
  }
  .tbl-header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .tbl-header span { font-size: 12px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .btn-reset {
    background: transparent; border: 1px solid rgba(255,107,53,0.3);
    border-radius: 8px; color: var(--accent2);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 12px; padding: 5px 10px; cursor: pointer; transition: all 0.2s;
  }
  .btn-reset:hover { background: rgba(255,107,53,0.1); }
  .col-hdr {
    display: grid; grid-template-columns: 75px 1fr 85px 85px;
    padding: 9px 14px; background: var(--card2);
    border-bottom: 1px solid var(--border);
  }
  .col-hdr span { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
  .col-hdr span:nth-child(3), .col-hdr span:nth-child(4) { text-align: right; }

  .day-row {
    display: grid; grid-template-columns: 75px 1fr 85px 85px;
    padding: 9px 14px; border-bottom: 1px solid rgba(30,45,71,0.4);
    align-items: center; transition: background 0.15s;
  }
  .day-row:hover { background: rgba(255,255,255,0.02); }
  .day-row.has-ot { background: rgba(0,212,170,0.03); }
  .day-date { font-size: 12px; color: var(--muted); }
  .day-name { font-size: 13px; font-weight: 500; }
  .day-name.fri { color: var(--accent2); }
  .day-name.sat { color: var(--accent3); }
  .ot-inp {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 8px;
    color: var(--text); font-family: 'Hind Siliguri', sans-serif;
    font-size: 13px; text-align: right; width: 75px; margin-left: auto;
    outline: none; transition: all 0.2s;
  }
  .ot-inp:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,212,170,0.12); }
  .cumul {
    font-family: 'Teko', sans-serif; font-size: 17px;
    text-align: right; font-weight: 500;
  }
  .cumul.low { color: var(--muted); }
  .cumul.med { color: var(--accent3); }
  .cumul.hi { color: var(--accent); }

  /* saving indicator */
  .save-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); display: inline-block;
    margin-left: 6px; opacity: 0; transition: opacity 0.3s;
  }
  .save-dot.show { opacity: 1; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: #000;
    padding: 11px 22px; border-radius: 50px;
    font-size: 13px; font-weight: 700;
    transition: transform 0.3s; z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .loading-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; gap: 16px;
  }
  .loading-screen.hide { display: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div style="font-size:40px">⏱️</div>
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:13px">লোড হচ্ছে...</div>
</div>

<!-- AUTH PAGE -->
<div class="page" id="authPage">
  <div class="auth-wrap">
    <div class="auth-logo">⏱️</div>
    <div class="auth-title">আমার OT ডায়েরি</div>
    <div class="auth-sub">ওভারটাইম ও বেতন ট্র্যাকার</div>
    <div class="auth-card">
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('login')">লগইন</button>
        <button class="tab-btn" onclick="switchTab('register')">রেজিস্ট্রেশন</button>
      </div>

      <!-- LOGIN -->
      <div id="loginForm">
        <div class="form-group">
          <label>📧 ইমেইল</label>
          <input type="email" id="loginEmail" placeholder="email@example.com">
        </div>
        <div class="form-group">
          <label>🔒 পাসওয়ার্ড</label>
          <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
        </div>
        <button class="btn-primary" onclick="doLogin()">লগইন করো</button>
        <div class="err-msg" id="loginErr"></div>
      </div>

      <!-- REGISTER -->
      <div id="registerForm" style="display:none">
        <div class="form-grid">
          <div class="form-group">
            <label>👤 নাম</label>
            <input type="text" id="regName" placeholder="তোমার নাম">
          </div>
          <div class="form-group">
            <label>🪪 ID No</label>
            <input type="text" id="regId" placeholder="যেমন: 1234">
          </div>
          <div class="form-group">
            <label>💰 বেসিক (৳)</label>
            <input type="number" id="regBasic" placeholder="14549">
          </div>
          <div class="form-group">
            <label>🏷️ ভাতা (৳)</label>
            <input type="number" id="regAllowance" placeholder="725">
          </div>
        </div>
        <div class="form-group">
          <label>⚡ OT রেট (৳/ঘন্টা)</label>
          <input type="number" id="regRate" placeholder="77.56" step="0.01">
        </div>
        <div class="form-group">
          <label>📧 ইমেইল</label>
          <input type="email" id="regEmail" placeholder="email@example.com">
        </div>
        <div class="form-group">
          <label>🔒 পাসওয়ার্ড</label>
          <input type="password" id="regPass" placeholder="কমপক্ষে ৬ অক্ষর">
        </div>
        <button class="btn-primary" onclick="doRegister()">অ্যাকাউন্ট তৈরি করো</button>
        <div class="err-msg" id="regErr"></div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN APP PAGE -->
<div class="page" id="appPage">
  <div class="app-wrap">
    <div class="header">
      <div class="top-bar">
        <div style="font-size:22px;font-family:'Teko',sans-serif;color:var(--accent)">⏱️ OT ডায়েরি <span class="save-dot" id="saveDot"></span></div>
        <button class="btn-logout" onclick="doLogout()">লগআউট</button>
      </div>
    </div>

    <div class="profile-badge">
      <div class="avatar" id="avatarLetter">?</div>
      <div class="profile-info">
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-id">ID: <span id="profileId">—</span> &nbsp;|&nbsp; রেট: ৳<span id="profileRate">—</span>/ঘন্টা</div>
      </div>
    </div>

    <div class="month-selector">
      <button class="month-nav" onclick="changeMonth(-1)">‹</button>
      <div>
        <div class="month-name-display" id="monthNameDisp">—</div>
        <div class="year-display" id="yearDisp">—</div>
      </div>
      <button class="month-nav" onclick="changeMonth(1)">›</button>
    </div>

    <div class="progress-sec">
      <div class="prog-lbl"><span>মাসিক OT অগ্রগতি</span><span id="progTxt">০ ঘন্টা</span></div>
      <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <div class="summary-grid">
      <div class="sum-card">
        <div class="s-lbl">মোট OT ঘন্টা</div>
        <div class="s-val" id="totalHrs">০</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">এই মাসে</div>
      </div>
      <div class="sum-card">
        <div class="s-lbl">OT উপার্জন</div>
        <div class="s-val orange" id="otEarn">৳ ০</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">অতিরিক্ত আয়</div>
      </div>
      <div class="sum-card full">
        <div class="s-lbl">মোট বেতন এই মাসে</div>
        <div class="s-val gold" id="totalSal">৳ —</div>
        <div class="breakdown">
          <div class="b-item"><div class="b-lbl">বেসিক</div><div class="b-val" id="bBasic">—</div></div>
          <div class="b-item"><div class="b-lbl">ভাতা</div><div class="b-val" id="bAllow">—</div></div>
          <div class="b-item"><div class="b-lbl">OT</div><div class="b-val" id="bOt">—</div></div>
        </div>
      </div>
    </div>

    <div class="table-card">
      <div class="tbl-header">
        <span>দৈনিক OT লগ</span>
        <button class="btn-reset" onclick="resetMonth()">মাস রিসেট</button>
      </div>
      <div class="col-hdr">
        <span>তারিখ</span><span>বার</span>
        <span style="text-align:right">OT ঘন্টা</span>
        <span style="text-align:right">মোট</span>
      </div>
      <div id="dayRows"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ সেভ হয়েছে!</div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, update, onValue, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQniSZqOQCPxJ-8nqQriKDxa9k5x2oxLA",
  authDomain: "ot-diary-20126.firebaseapp.com",
  databaseURL: "https://ot-diary-20126-default-rtdb.firebaseio.com",
  projectId: "ot-diary-20126",
  storageBucket: "ot-diary-20126.firebasestorage.app",
  messagingSenderId: "190068621192",
  appId: "1:190068621192:web:0f5cd0ecd3994bcef8043d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const bnMonths = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
const bnDays = ['রবিবার','সোমবার','মঙ্গলবার','বুধবার','বৃহস্পতিবার','শুক্রবার','শনিবার'];

let currentUser = null, userProfile = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let otData = {};
let saveTimer = null;
let unsubscribe = null;

// ===== AUTH STATE =====
onAuthStateChanged(auth, async (user) => {
  document.getElementById('loadingScreen').classList.add('hide');
  if (user) {
    currentUser = user;
    const snap = await get(ref(db, `users/${user.uid}/profile`));
    if (snap.exists()) {
      userProfile = snap.val();
      showApp();
    } else {
      showPage('authPage');
    }
  } else {
    showPage('authPage');
  }
});

// ===== PAGES =====
window.showPage = function(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
  document.getElementById('loginErr').textContent = '';
  document.getElementById('regErr').textContent = '';
}

// ===== REGISTER =====
window.doRegister = async function() {
  const name = document.getElementById('regName').value.trim();
  const idNo = document.getElementById('regId').value.trim();
  const basic = parseFloat(document.getElementById('regBasic').value) || 0;
  const allowance = parseFloat(document.getElementById('regAllowance').value) || 0;
  const rate = parseFloat(document.getElementById('regRate').value) || 0;
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  const errEl = document.getElementById('regErr');

  if (!name || !idNo || !email || !pass) { errEl.textContent = 'সব তথ্য পূরণ করো'; return; }
  if (pass.length < 6) { errEl.textContent = 'পাসওয়ার্ড কমপক্ষে ৬ অক্ষর'; return; }

  const btn = document.querySelector('#registerForm .btn-primary');
  btn.disabled = true; btn.textContent = 'তৈরি হচ্ছে...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await set(ref(db, `users/${cred.user.uid}/profile`), { name, idNo, basic, allowance, rate, email });
    userProfile = { name, idNo, basic, allowance, rate };
    currentUser = cred.user;
    showApp();
  } catch(e) {
    errEl.textContent = e.code === 'auth/email-already-in-use' ? 'এই ইমেইল আগেই ব্যবহৃত' : e.message;
  }
  btn.disabled = false; btn.textContent = 'অ্যাকাউন্ট তৈরি করো';
}

// ===== LOGIN =====
window.doLogin = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  if (!email || !pass) { errEl.textContent = 'ইমেইল ও পাসওয়ার্ড দাও'; return; }

  const btn = document.querySelector('#loginForm .btn-primary');
  btn.disabled = true; btn.textContent = 'লগইন হচ্ছে...';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    errEl.textContent = 'ইমেইল বা পাসওয়ার্ড ভুল';
    btn.disabled = false; btn.textContent = 'লগইন করো';
  }
}

// ===== LOGOUT =====
window.doLogout = async function() {
  if (unsubscribe) unsubscribe();
  await signOut(auth);
  otData = {};
  showPage('authPage');
}

// ===== SHOW APP =====
function showApp() {
  showPage('appPage');
  const p = userProfile;
  document.getElementById('avatarLetter').textContent = p.name ? p.name[0].toUpperCase() : '?';
  document.getElementById('profileName').textContent = p.name || '—';
  document.getElementById('profileId').textContent = p.idNo || '—';
  document.getElementById('profileRate').textContent = p.rate || '—';
  loadMonthData();
}

// ===== MONTH =====
window.changeMonth = function(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (unsubscribe) unsubscribe();
  loadMonthData();
}

function monthKey() { return `${currentYear}_${String(currentMonth+1).padStart(2,'0')}`; }

function loadMonthData() {
  document.getElementById('monthNameDisp').textContent = bnMonths[currentMonth];
  document.getElementById('yearDisp').textContent = currentYear + ' সাল';
  const path = `users/${currentUser.uid}/ot/${monthKey()}`;
  unsubscribe = onValue(ref(db, path), snap => {
    otData = snap.exists() ? snap.val() : {};
    renderMonth();
  });
}

function daysInMonth(m, y) { return new Date(y, m+1, 0).getDate(); }

function renderMonth() {
  const days = daysInMonth(currentMonth, currentYear);
  const container = document.getElementById('dayRows');
  container.innerHTML = '';
  for (let d = 1; d <= days; d++) {
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const isFri = dow === 5, isSat = dow === 6;
    const val = otData[d] || '';
    const row = document.createElement('div');
    row.className = 'day-row' + (val ? ' has-ot' : '');
    row.id = `row-${d}`;
    row.innerHTML = `
      <div class="day-date">${d} ${bnMonths[currentMonth].slice(0,3)}</div>
      <div class="day-name ${isFri?'fri':isSat?'sat':''}">${bnDays[dow]}</div>
      <input class="ot-inp" type="number" min="0" max="24" step="0.5"
        placeholder="০" value="${val}"
        oninput="liveOT(${d}, this.value)"
        onchange="saveOT(${d}, this.value)">
      <div class="cumul low" id="cum-${d}">—</div>
    `;
    container.appendChild(row);
  }
  updateSummary();
}

window.liveOT = function(day, val) {
  const v = parseFloat(val) || 0;
  if (v === 0) delete otData[day]; else otData[day] = v;
  updateSummary();
  document.getElementById(`row-${day}`).classList.toggle('has-ot', v > 0);
}

window.saveOT = function(day, val) {
  const v = parseFloat(val) || 0;
  if (v === 0) delete otData[day]; else otData[day] = v;
  updateSummary();
  // Debounce save
  clearTimeout(saveTimer);
  showSaveDot(true);
  saveTimer = setTimeout(async () => {
    const path = `users/${currentUser.uid}/ot/${monthKey()}/${day}`;
    if (v === 0) await remove(ref(db, path));
    else await set(ref(db, path), v);
    showSaveDot(false);
    showToast('☁️ Firebase এ সেভ হয়েছে!');
  }, 800);
}

window.resetMonth = async function() {
  if (!confirm('এই মাসের সব OT ডেটা মুছবো?')) return;
  await remove(ref(db, `users/${currentUser.uid}/ot/${monthKey()}`));
  otData = {};
  renderMonth();
}

function updateSummary() {
  const days = daysInMonth(currentMonth, currentYear);
  const rate = parseFloat(userProfile?.rate) || 0;
  const basic = parseFloat(userProfile?.basic) || 0;
  const allowance = parseFloat(userProfile?.allowance) || 0;
  let cum = 0;
  for (let d = 1; d <= days; d++) {
    const v = parseFloat(otData[d]) || 0;
    cum += v;
    const el = document.getElementById(`cum-${d}`);
    if (el) {
      if (cum === 0) { el.textContent = '—'; el.className = 'cumul low'; }
      else { el.textContent = cum; el.className = 'cumul ' + (cum < 20?'low':cum<50?'med':'hi'); }
    }
  }
  const otEarn = cum * rate;
  const total = basic + allowance + otEarn;
  document.getElementById('totalHrs').textContent = cum || '০';
  document.getElementById('otEarn').textContent = '৳ ' + otEarn.toLocaleString('en-IN',{maximumFractionDigits:2});
  document.getElementById('totalSal').textContent = rate>0 ? '৳ '+total.toLocaleString('en-IN',{maximumFractionDigits:2}) : '৳ —';
  document.getElementById('bBasic').textContent = basic ? '৳'+basic.toLocaleString('en-IN') : '—';
  document.getElementById('bAllow').textContent = allowance ? '৳'+allowance.toLocaleString('en-IN') : '—';
  document.getElementById('bOt').textContent = otEarn ? '৳'+otEarn.toLocaleString('en-IN',{maximumFractionDigits:2}) : '—';
  const pct = Math.min((cum/120)*100, 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = cum + ' ঘন্টা';
}

function showSaveDot(show) {
  document.getElementById('saveDot').classList.toggle('show', show);
}

let toastTimer;
function showToast(msg = '✅ সেভ হয়েছে!') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
